<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Quiz Corticoesteroides</title>

<style>
body { font-family: Arial; text-align: center; background: #f4f6f8; }
.container { margin-top: 40px; }
input { font-size: 20px; padding: 5px; text-align: center; }
button { padding: 10px 20px; margin-top: 10px; cursor: pointer; }
#timer { font-size: 28px; color: red; }
#feedback { font-weight: bold; margin-top: 10px; }
#final { white-space: pre-line; text-align: left; max-width: 800px; margin: auto; }
</style>
</head>

<body>

<div class="container">
<h1>🫁 Quiz Corticoesteroides</h1>

<div id="start">
<input type="text" id="nombre" placeholder="Tu nombre">
<br>
<button onclick="iniciar()">Iniciar</button>
</div>

<div id="quiz" style="display:none;">
<h3 id="contador"></h3>
<h2 id="pregunta"></h2>
<div id="timer">30</div>

<input type="text" id="respuesta"><br>

<button id="btnResponder" onclick="responder()">Responder</button>

<p id="feedback"></p>

<button id="siguiente" onclick="siguiente()" style="display:none;">
Siguiente
</button>
</div>

<div id="resultado" style="display:none;">
<h2>Resultados</h2>
<p id="final"></p>
<button onclick="reiniciar()">Reintentar</button>
</div>

</div>
<script>

// 🧠 BANCO AMPLIADO + VARIACIONES
let banco = [

{p:"Corticosteroide inhalado que inhibe NF-κB y AP-1 → ↓ citocinas inflamatorias; usado en asma persistente", r:["beclometasona"]},
{p:"Fármaco que reduce expresión génica inflamatoria inhibiendo NF-κB y AP-1; inhalado en asma", r:["beclometasona"]},

{p:"Corticosteroide inhalado activado en pulmón → inhibe NF-κB y AP-1", r:["ciclesonida"]},

{p:"Corticosteroide inhalado usado con formoterol → inhibe NF-κB y AP-1", r:["budesonida"]},
{p:"ICS que se combina frecuentemente con LABA en terapia SMART", r:["budesonida"]},

{p:"Corticosteroide inhalado muy lipofílico → inhibe NF-κB y AP-1", r:["fluticasona"]},

{p:"Corticosteroide sistémico potente sin actividad mineralocorticoide", r:["dexametasona"]},
{p:"Glucocorticoide de acción prolongada que suprime inflamación génica", r:["dexametasona"]},

{p:"Glucocorticoide sistémico usado en exacerbaciones de asma", r:["prednisolona"]},

{p:"Antagonista CysLT1 → bloquea LTD4 → ↓ moco y broncoconstricción", r:["montelukast"]},

{p:"Inhibe 5-lipooxigenasa → ↓ leucotrienos", r:["zileuton"]},

{p:"Anticuerpo monoclonal anti-IgE → previene activación mastocitos", r:["omalizumab"]},

{p:"Anticuerpo monoclonal anti-IL5 → ↓ eosinófilos", r:["benralizumab"]},

// 🔬 FISIOLOGÍA
{p:"Segundo mensajero que produce broncodilatación β2", r:["camp","ampc"]},
{p:"Enzima activada por Gs", r:["adenilciclasa"]},
{p:"Quinasa activada por cAMP", r:["pka"]},
{p:"Enzima que degrada cAMP", r:["fosfodiesterasa","pde"]},
{p:"Ion liberado por IP3", r:["calcio"]},
{p:"Neurotransmisor broncoconstrictor vagal", r:["acetilcolina"]},
{p:"Receptor muscarínico bronquial", r:["m3"]},
{p:"Receptor de histamina bronquial", r:["h1"]},
{p:"Ig que sensibiliza mastocitos", r:["ige"]},
{p:"Célula que libera histamina", r:["mastocito"]},
{p:"Célula estimulada por IL-5", r:["eosinofilo","eosinófilo"]},
{p:"Mediadores de moco y edema", r:["leucotrienos"]},
{p:"Predisposición genética alérgica", r:["atopia"]},
{p:"Células que secretan moco", r:["caliciformes","goblet"]},
{p:"Respuesta exagerada bronquial", r:["hiperreactividad"]}

];

// 🧠 HISTORIAL PARA EVITAR REPETICIÓN
let historialUsadas = JSON.parse(localStorage.getItem("usadas")) || [];

function seleccionarPreguntas(){

    let disponibles = banco.filter(p => 
        !historialUsadas.includes(p.p)
    );

    // Si se acaban → reset inteligente
    if(disponibles.length < 10){
        historialUsadas = [];
        disponibles = [...banco];
    }

    let mezcladas = disponibles.sort(()=>Math.random()-0.5);

    let seleccion = mezcladas.slice(0,10);

    // Guardar usadas
    seleccion.forEach(p => historialUsadas.push(p.p));

    localStorage.setItem("usadas", JSON.stringify(historialUsadas));

    return seleccion;
}

let preguntas = [];
let index = 0;
let puntaje = 0;
let tiempo;
let intervalo;
let respuestasUsuario = [];
let nombreGlobal = "";

function iniciar(){
    let nombreInput = document.getElementById("nombre").value;
    if(nombreInput !== "") nombreGlobal = nombreInput;

    document.getElementById("start").style.display = "none";
    document.getElementById("quiz").style.display = "block";

    preguntas = seleccionarPreguntas();

    index = 0;
    puntaje = 0;
    respuestasUsuario = [];

    cargarPregunta();
}

function cargarPregunta(){
    if(index >= preguntas.length){
        finalizar();
        return;
    }

    document.getElementById("contador").innerText =
        "Pregunta " + (index+1) + " / 10";

    document.getElementById("pregunta").innerText = preguntas[index].p;

    let input = document.getElementById("respuesta");
    let boton = document.getElementById("btnResponder");

    input.value = "";
    input.disabled = false;
    boton.disabled = false;

    document.getElementById("feedback").innerText = "";
    document.getElementById("siguiente").style.display = "none";

    tiempo = 30;
    document.getElementById("timer").innerText = tiempo;

    intervalo = setInterval(()=>{
        tiempo--;
        document.getElementById("timer").innerText = tiempo;

        if(tiempo <= 0){
            clearInterval(intervalo);
            tiempoAgotado();
        }
    },1000);
}

function responder(){
    clearInterval(intervalo);

    let input = document.getElementById("respuesta");
    let boton = document.getElementById("btnResponder");

    let resp = input.value.toLowerCase().trim();
    let correctas = preguntas[index].r;

    let puntos = 0;

    if(correctas.includes(resp)){
        puntos = 50 - (30 - tiempo);
        puntaje += puntos;
        document.getElementById("feedback").innerText =
        "✅ Correcto (+" + puntos + " pts)";
    } else {
        document.getElementById("feedback").innerText =
        "❌ Incorrecto. Correcta: " + correctas.join(" / ");
    }

    respuestasUsuario.push({
        pregunta: preguntas[index].p,
        tuRespuesta: resp || "Sin respuesta",
        correcta: correctas.join(" / ")
    });

    input.disabled = true;
    boton.disabled = true;

    document.getElementById("siguiente").style.display = "inline-block";
}

function tiempoAgotado(){
    document.getElementById("feedback").innerText =
    "⏱️ Tiempo agotado. Correcta: " + preguntas[index].r.join(" / ");

    respuestasUsuario.push({
        pregunta: preguntas[index].p,
        tuRespuesta: "Sin respuesta",
        correcta: preguntas[index].r.join(" / ")
    });

    document.getElementById("siguiente").style.display = "inline-block";
}

function siguiente(){
    index++;
    cargarPregunta();
}

function finalizar(){
    document.getElementById("quiz").style.display = "none";
    document.getElementById("resultado").style.display = "block";

    let resumen = nombreGlobal + "\nPuntaje: " + puntaje + " / 500\n\n";

    respuestasUsuario.forEach((r,i)=>{
        resumen += (i+1) + ". " + r.pregunta + "\n";
        resumen += "Tu respuesta: " + r.tuRespuesta + "\n";
        resumen += "Correcta: " + r.correcta + "\n\n";
    });

    document.getElementById("final").innerText = resumen;
}

function reiniciar(){
    document.getElementById("resultado").style.display = "none";
    document.getElementById("quiz").style.display = "block";
    iniciar();
}

</script>
